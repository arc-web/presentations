<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentations - ARC Web</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #07070F; color: #F0EEFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .container { max-width: 900px; width: 100%; padding: 48px 24px; }
  h1 { font-size: 32px; margin-bottom: 8px; }
  .sub { color: #7A728A; margin-bottom: 40px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  a { padding: 16px 20px; background: #0F0F1A; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; color: #F0EEFF; text-decoration: none; font-size: 16px; transition: all 0.2s; }
  a:hover { border-color: #7B2FBE; background: #16162A; }
  .arrow { float: right; color: #7A728A; }
</style>
</head>
<body>
<div class="container">
  <h1>ARC Web Presentations</h1>
  <p class="sub">1 decks across all repositories</p>
  <div class="grid">
    <a href="./arc-browser/">Arc Browser <span class="arrow">→</span></a>
  </div>
</div>
</body>
</html>
